<div class="action-bar">
  <h2>Autores</h2>
  <a mat-flat-button color="primary" routerLink="novo">
    <mat-icon>add</mat-icon> Novo Autor
  </a>
</div>

<app-loading-spinner *ngIf="loading$ | async"></app-loading-spinner>

<mat-table [dataSource]="(autores$ | async) ?? []" *ngIf="!(loading$ | async)">
  <ng-container matColumnDef="nome">
    <mat-header-cell *matHeaderCellDef>Nome</mat-header-cell>
    <mat-cell *matCellDef="let a">{{ a.nome }}</mat-cell>
  </ng-container>
  <ng-container matColumnDef="email">
    <mat-header-cell *matHeaderCellDef>E-mail</mat-header-cell>
    <mat-cell *matCellDef="let a">{{ a.email }}</mat-cell>
  </ng-container>
  <ng-container matColumnDef="acoes">
    <mat-header-cell *matHeaderCellDef>Ações</mat-header-cell>
    <mat-cell *matCellDef="let a">
      <a mat-icon-button [routerLink]="[a.id, 'editar']"><mat-icon>edit</mat-icon></a>
      <button mat-icon-button color="warn" (click)="onDelete(a.id, a.nome)"><mat-icon>delete</mat-icon></button>
    </mat-cell>
  </ng-container>
  <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
  <mat-row *matRowDef="let row; columns: displayedColumns;"></mat-row>
</mat-table>
