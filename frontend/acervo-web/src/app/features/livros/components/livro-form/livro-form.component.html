<div class="page-container">
  <h2>{{ editId ? 'Editar' : 'Novo' }} Livro</h2>
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <mat-form-field appearance="outline" style="width:100%; margin-bottom:16px">
      <mat-label>Título</mat-label>
      <input matInput formControlName="titulo">
      <mat-error *ngIf="form.get('titulo')?.hasError('required')">Título é obrigatório</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" style="width:100%; margin-bottom:16px">
      <mat-label>ISBN</mat-label>
      <input matInput formControlName="isbn">
      <mat-error *ngIf="form.get('isbn')?.hasError('required')">ISBN é obrigatório</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" style="width:100%; margin-bottom:16px">
      <mat-label>Ano de Publicação</mat-label>
      <input matInput type="number" formControlName="anoPublicacao">
      <mat-error *ngIf="form.get('anoPublicacao')?.hasError('required')">Ano é obrigatório</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" style="width:100%; margin-bottom:16px">
      <mat-label>Autor</mat-label>
      <mat-select formControlName="autorId">
        <mat-option *ngFor="let a of autores" [value]="a.id">{{ a.nome }}</mat-option>
      </mat-select>
      <mat-error *ngIf="form.get('autorId')?.hasError('required')">Autor é obrigatório</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" style="width:100%; margin-bottom:16px">
      <mat-label>Gênero</mat-label>
      <mat-select formControlName="generoId">
        <mat-option *ngFor="let g of generos" [value]="g.id">{{ g.nome }}</mat-option>
      </mat-select>
      <mat-error *ngIf="form.get('generoId')?.hasError('required')">Gênero é obrigatório</mat-error>
    </mat-form-field>

    <div style="display:flex; gap:8px">
      <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid">Salvar</button>
      <button mat-button type="button" routerLink="/livros">Cancelar</button>
    </div>
  </form>
</div>
