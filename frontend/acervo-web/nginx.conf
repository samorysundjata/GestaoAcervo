server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Compressão gzip para assets estáticos
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # Redireciona todas as rotas para index.html (HTML5 routing do Angular)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache para assets com hash no nome (gerados pelo Angular build)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Sem cache para index.html (sempre busca versão atual)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
